<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copilot Budget Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f0;
      --bg-tertiary: #eeede8;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --blue: #378ADD;
      --green-bg: #EAF3DE;
      --green-text: #3B6D11;
      --green-bar: #639922;
      --yellow-bg: #FAEEDA;
      --yellow-text: #854F0B;
      --yellow-bar: #EF9F27;
      --red-bg: #FCEBEB;
      --red-text: #A32D2D;
      --red-bar: #E24B4A;
      --font: system-ui, -apple-system, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #252522;
        --bg-tertiary: #2e2e2b;
        --text-primary: #f0efe8;
        --text-secondary: #9a9991;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
        --blue: #5aa3f0;
        --green-bg: #27500A;
        --green-text: #C0DD97;
        --green-bar: #639922;
        --yellow-bg: #633806;
        --yellow-text: #FAC775;
        --yellow-bar: #EF9F27;
        --red-bg: #791F1F;
        --red-text: #F7C1C1;
        --red-bar: #E24B4A;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      border: 0.5px solid var(--border);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    .app-title {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text-primary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 8px 28px 8px 10px;
      outline: none;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .input-wrap input::-webkit-outer-spin-button,
    .input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .input-wrap input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(55,138,221,0.2);
    }

    .unit {
      position: absolute;
      right: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .links {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .link-btn {
      font-size: 12px;
      font-family: var(--font);
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
    }

    .link-btn:hover { background: var(--bg-tertiary); }

    .metric-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .metric-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 1rem;
    }

    .metric-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 26px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .metric-value.accent { color: var(--blue); }

    .metric-sub {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .bar-section { margin-bottom: 1.25rem; }

    .bar-wrap { margin-bottom: 0.5rem; }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    .bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .tip {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      line-height: 1.5;
    }

    .tip.green  { background: var(--green-bg);  color: var(--green-text); }
    .tip.yellow { background: var(--yellow-bg); color: var(--yellow-text); }
    .tip.red    { background: var(--red-bg);    color: var(--red-text); }

    .footer {
      margin-top: 1.5rem;
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="app-title">GitHub Copilot — daily request budget</p>

    <div class="inputs">
      <div class="field">
        <label>Monthly quota</label>
        <div class="input-wrap">
          <input type="number" id="quota" value="300" min="1" step="1" />
        </div>
      </div>
      <div class="field">
        <label>Used so far this month</label>
        <div class="input-wrap">
          <input type="number" id="used-pct-input" value="0" min="0" max="100" step="0.1" />
          <span class="unit">%</span>
        </div>
      </div>
    </div>

    <div class="links">
      <a class="link-btn" href="https://github.com/settings/copilot" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        Open billing settings
      </a>
      <a class="link-btn" href="https://github.com/settings/billing/summary" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 2A1.5 1.5 0 000 3.5v9A1.5 1.5 0 001.5 14h13a1.5 1.5 0 001.5-1.5v-9A1.5 1.5 0 0014.5 2h-13zM1 3.5a.5.5 0 01.5-.5h13a.5.5 0 01.5.5V5H1V3.5zM1 6h14v6.5a.5.5 0 01-.5.5h-13a.5.5 0 01-.5-.5V6zm2 3a.5.5 0 000 1h2a.5.5 0 000-1H3zm4 0a.5.5 0 000 1h5a.5.5 0 000-1H7z"/></svg>
        Billing summary
      </a>
    </div>

    <div class="metric-cards" id="cards"></div>

    <div class="bar-section">
      <div class="bar-wrap">
        <div class="bar-meta"><span>Month progress</span><span id="month-pct-label">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="month-bar" style="background:var(--blue);width:0%"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-meta"><span>Monthly quota used</span><span id="used-pct-label">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="used-bar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="bar-section">
      <div class="bar-wrap">
        <div class="bar-meta"><span>Today's allowance used</span><span id="daily-used-pct-label">0%</span></div>
        <div class="bar-track"><div class="bar-fill" id="daily-used-bar" style="width:0%"></div></div>
      </div>
    </div>

    <p class="tip" id="tip"></p>

    <p class="footer">Resets on the 1st of each month · 00:00 UTC</p>
  </div>

  <script>
    function getBarColor(pct, type) {
      const style = getComputedStyle(document.documentElement);
      if (pct > 90) return style.getPropertyValue('--red-bar').trim();
      if (pct > 65) return style.getPropertyValue('--yellow-bar').trim();
      return style.getPropertyValue('--green-bar').trim();
    }

    function compute() {
      const quota = Math.max(1, parseFloat(document.getElementById('quota').value) || 300);
      const usedPct = Math.min(100, Math.max(0, parseFloat(document.getElementById('used-pct-input').value) || 0));
      const used = quota * usedPct / 100;

      const now = new Date();
      const month = now.getMonth();
      const year = now.getFullYear();
      const dayOfMonth = now.getDate();
      const hour = now.getHours();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysLeft = daysInMonth - dayOfMonth + 1;
      const monthPct = Math.round((dayOfMonth - 1) / daysInMonth * 100);

      const remaining = Math.max(0, quota - used);
      const dailyBudget = remaining / daysLeft;

      const priorDaysIdeal = (quota / daysInMonth) * (dayOfMonth - 1);
      const usedToday = Math.max(0, used - priorDaysIdeal);
      const dailyUsedPct = Math.min(100, dailyBudget > 0 ? (usedToday / dailyBudget) * 100 : 100);

      const monthUsedPct = parseFloat(usedPct.toFixed(1));

      document.getElementById('month-bar').style.width = monthPct + '%';
      document.getElementById('month-pct-label').textContent = monthPct + '%';

      document.getElementById('used-bar').style.width = monthUsedPct + '%';
      document.getElementById('used-bar').style.background = getBarColor(monthUsedPct);
      document.getElementById('used-pct-label').textContent = monthUsedPct + '%';

      document.getElementById('daily-used-bar').style.width = dailyUsedPct.toFixed(1) + '%';
      document.getElementById('daily-used-bar').style.background = getBarColor(dailyUsedPct);
      document.getElementById('daily-used-pct-label').textContent = dailyUsedPct.toFixed(1) + '%';

      const ahead = remaining - (quota / daysInMonth * daysLeft);
      const aheadAbs = Math.round(Math.abs(ahead));
      const tipEl = document.getElementById('tip');

      let state, msg;
      if (monthUsedPct > 90) {
        state = 'red';
        msg = ahead >= 0
          ? `Running low — only ${Math.round(remaining)} requests left. Use them carefully.`
          : `${aheadAbs} requests behind pace with little buffer left. Consider switching to a base model.`;
      } else if (monthUsedPct > 65 || ahead < 0) {
        state = 'yellow';
        msg = ahead >= 0
          ? `Slightly ahead of pace by ${aheadAbs} requests — keep an eye on it.`
          : `${aheadAbs} requests behind pace. Slow down a bit to stay on track.`;
      } else {
        state = 'green';
        msg = `${aheadAbs} requests ahead of pace — you're in good shape.`;
      }

      tipEl.className = 'tip ' + state;
      tipEl.textContent = msg;

      document.getElementById('cards').innerHTML = `
        <div class="metric-card">
          <p class="metric-label">Daily budget</p>
          <p class="metric-value accent">${Math.round(dailyBudget)}</p>
          <p class="metric-sub">requests/day for ${daysLeft} day${daysLeft !== 1 ? 's' : ''} left</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Used today (est.)</p>
          <p class="metric-value">${Math.round(usedToday)}</p>
          <p class="metric-sub">of ${Math.round(dailyBudget)} daily (${dailyUsedPct.toFixed(1)}%)</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Remaining this month</p>
          <p class="metric-value">${Math.round(remaining)}</p>
          <p class="metric-sub">of ${quota} total (${monthUsedPct}% used)</p>
        </div>
        <div class="metric-card">
          <p class="metric-label">Ideal daily pace</p>
          <p class="metric-value">${Math.round(quota / daysInMonth)}</p>
          <p class="metric-sub">requests/day spread evenly</p>
        </div>
      `;
    }

    document.getElementById('quota').addEventListener('input', compute);
    document.getElementById('used-pct-input').addEventListener('input', compute);
    compute();
  </script>
</body>
</html>
